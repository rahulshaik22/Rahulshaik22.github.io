<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth}
body{background:#000;color:#fff}
nav{position:fixed;width:100%;padding:20px 8%;display:flex;justify-content:space-between;z-index:100;background:rgba(0,0,0,.6);backdrop-filter:blur(10px)}
nav h2{color:#22c55e}
.hero{height:100vh;background:url('rahul.png') no-repeat right center/cover;position:relative;display:flex;align-items:center;padding:0 8%}
.overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.95) 35%,rgba(0,0,0,.7) 60%,transparent 100%)}
.content{position:relative;z-index:2;max-width:600px}
.content h1{font-size:64px;margin-bottom:20px}
.content p{color:#ccc;margin-bottom:30px}
.buttons{display:flex;flex-direction:column;gap:12px}
.btn{padding:12px 24px;border-radius:8px;text-decoration:none;transition:.3s;width:fit-content}
.primary{background:#22c55e;color:#fff}
.secondary{border:1px solid #22c55e;color:#22c55e}
.secondary:hover{background:#22c55e;color:#000}
.tertiary{border:1px solid #3b82f6;color:#3b82f6}
.tertiary:hover{background:#3b82f6;color:#fff}
section{padding:80px 8%}
footer{text-align:center;padding:20px;color:#666}
@media(max-width:768px){.content h1{font-size:40px}}
</style>
</head>
<body>

<nav>
  <h2>Rahul</h2>
</nav>

<section class="hero">
  <div class="overlay"></div>
  <div class="content">
    <h1>Hi, I am Rahul</h1>
    <p>I create modern websites and cinematic digital experiences.</p>

    <div class="buttons">
      <a href="#about" class="btn primary">Know More</a>
      <a href="#" class="btn secondary">My Work</a>
      <a href="https://your-link.com" target="_blank" class="btn tertiary">Open Imperial Cars 🚗</a>
    </div>
  </div>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am a creative developer focused on modern and cinematic web experiences.</p>
</section>

<footer>© 2026 Rahul</footer>

</body>
</html>
