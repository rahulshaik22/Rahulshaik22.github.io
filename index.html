<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#000;
  color:#fff;
}

/* ✅ FIXED FONT */
@font-face {
  font-family:'Ramadan';
  src: url('https://rahulshaik22.github.io/arabic-ramadan.ttf') format('truetype');
}
/* NAVBAR */
nav{
  position:fixed;
  width:100%;
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  z-index:100;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

nav h2{
  color:#22c55e;
}

/* HERO */
.hero{
  height:100vh;
  background:url('rahul.png') no-repeat right center/cover;
  display:flex;
  align-items:center;
  padding:0 8%;
  position:relative;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to right,
    rgba(0,0,0,0.95) 35%,
    rgba(0,0,0,0.7) 60%,
    transparent 100%);
}

.content{
  position:relative;
  z-index:2;
  max-width:600px;
}

.content h1{
  font-size:64px;
  margin-bottom:20px;
}

/* ✅ ARABIC FONT APPLIED */
.ramadan{
  font-family:'Ramadan', cursive !important;
  font-size:72px;
  letter-spacing:3px;
  color:#22c55e;
  text-shadow:0 0 10px #22c55e, 0 0 25px #22c55e;
}

.content p{
  color:#ccc;
  margin-bottom:20px;
  line-height:1.6;
}

/* BUTTONS */
.buttons{
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:flex-start;
}

/* KNOW MORE */
.primary{
  padding:14px 28px;
  background:#22c55e;
  color:#fff;
  border-radius:10px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
  box-shadow:0 0 10px rgba(34,197,94,0.3);
}

.primary:hover{
  background:#16a34a;
}

/* PREMIUM BUTTON */
.premium{
  position:relative;
  padding:14px 28px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  color:#fff;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 10px rgba(34,197,94,0.4);
}

.premium:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 0 25px rgba(34,197,94,0.8),
             0 0 50px rgba(34,197,94,0.4);
}

.premium::before{
  content:"";
  position:absolute;
  top:0;
  left:-75%;
  width:50%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  transform:skewX(-20deg);
}

.premium:hover::before{
  animation:shine 0.8s forwards;
}

@keyframes shine{
  100%{left:125%}
}

/* ABOUT */
section{
  padding:100px 8%;
}

h2{
  color:#22c55e;
  margin-bottom:20px;
}

p{
  color:#aaa;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#666;
}

/* MOBILE */
@media(max-width:768px){
  .content h1{
    font-size:40px;
  }
  .ramadan{
    font-size:48px;
  }
}
</style>

</head>

<body>

<nav>
  <h2>Rahul</h2>
</nav>

<section class="hero">
  <div class="overlay"></div>

  <div class="content">
    <h1>Hi, I am <span class="ramadan">Rahul Shaik</span></h1>
    <p>I create modern websites and cinematic digital experiences.</p>

```
<!-- ✅ FIXED BUTTONS -->
<div class="buttons">
  <a href="#about" class="primary">Know More</a>

  <a href="https://rahulshaik22.github.io/imperial-cars.html" target="_blank" class="premium">
    My Work 🚗
  </a>
</div>
```

  </div>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am a creative developer focused on building modern, cinematic, and high-performance websites.</p>
</section>

<footer>
  © 2026 Rahul | All Rights Reserved
</footer>

</body>
</html>
