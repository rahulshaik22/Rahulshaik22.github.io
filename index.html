<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahul Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    header h1 {
      font-size: 3rem;
      color: #facc15;
    }

    header p {
      margin-top: 10px;
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #facc15;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    footer {
      padding: 20px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    <h1>Rahul 🚀</h1>
    <p>Web Developer | Creative Designer</p>
    <a href="#" class="btn">Contact Me</a>

  <section class="section">
    <h2>My Projects</h2>

    <div class="card">
      <h3>Imperial Cars 🚗</h3>
      <p>Explore premium car collection</p>
      <a href="imperial-cars.html" class="btn">Open</a>
    </div>

    <div class="card">
      <h3>Project 2</h3>
      <p>Coming soon...</p>
    </div>
  </section>

  <footer>
    © 2026 Rahul | Built with ❤️
  </footer>

</body>
</html>
