<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#000;color:#fff}

/* HERO */
.hero{
  height:100vh;
  background:url('rahul.png') no-repeat right center/cover;
  display:flex;
  align-items:center;
  padding:0 8%;
  position:relative;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to right,
    rgba(0,0,0,0.95) 35%,
    rgba(0,0,0,0.7) 60%,
    transparent 100%);
}

.content{position:relative;z-index:2}
.content h1{font-size:64px;margin-bottom:20px}
.content p{color:#ccc;margin-bottom:30px}

/* BUTTONS */
.buttons{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* NORMAL BUTTON */
.primary{
  padding:12px 24px;
  background:#22c55e;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
}

/* PREMIUM BUTTON */
.premium{
  position:relative;
  padding:14px 28px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  color:#fff;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  overflow:hidden;
  transition:0.3s;
  box-shadow:0 0 10px rgba(34,197,94,0.4);
}

.premium:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 0 25px rgba(34,197,94,0.8),
             0 0 50px rgba(34,197,94,0.4);
}

.premium::before{
  content:"";
  position:absolute;
  top:0;
  left:-75%;
  width:50%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  transform:skewX(-20deg);
}

.premium:hover::before{
  animation:shine 0.8s forwards;
}

@keyframes shine{
  100%{left:125%}
}
</style>
</head>

<body>

<section class="hero">
  <div class="overlay"></div>

  <div class="content">
    <h1>Hi, I am Rahul</h1>
    <p>I create modern websites and cinematic digital experiences.</p>

    <div class="buttons">
      <a href="#about" class="primary">Know More</a>
      <a href="https://your-imperial-link.com" target="_blank" class="premium">
        My Work 🚗
      </a>
    </div>
  </div>
</section>

</body>
</html>
