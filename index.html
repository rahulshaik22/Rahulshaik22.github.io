<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Macondo&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Macondo', cursive;
        }

        body {
            background: #000; /* Fallback color */
            color: #fff;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background-color: #000; /* Ensures the rest of the page is black */
        }

 /* THE FIX: Background Image pseudo-element */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Double check: is it rahul.png or rahul.PNG? it MUST match exactly */
    background-image: url('rahul.png'); 
    background-repeat: no-repeat;
    background-size: cover;
    /* This ensures the subject of your photo stays visible */
    background-position: center right; 
    z-index: 1; 
    display: block;
}
        /* Overlay to make text readable */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(0,0,0,0.9) 20%, 
                rgba(0,0,0,0.4) 50%,
                transparent 100%
            );
            z-index: 2; /* Sits above the image */
        }

        .content {
            position: relative;
            z-index: 3; /* Sits above the overlay */
            max-width: 900px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 400;
        }

        .lavish-name {
            font-family: 'Lavishly Yours', cursive;
            color: #22c55e;
            font-size: 120px; 
            display: block;
            margin: -10px 0; /* Tightens space between lines */
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
            line-height: 1;
        }

        .content p {
            font-size: 20px;
            color: #ccc;
            margin: 20px 0 35px 0;
            max-width: 500px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 12px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            text-align: center;
            transition: 0.3s;
            width: 200px;
            color: #fff;
            background: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .btn:hover {
            background: #16a34a;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .lavish-name { font-size: 80px; }
            .hero::before { background-position: center; opacity: 0.7; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>
        
        <div class="content">
            <h1 class="hero-title">
                Hi, I am <br>
                <span class="lavish-name">Rahul Shaik</span>
            </h1>
            
            <p>I create modern websites and cinematic digital experiences.</p>
            
            <div class="buttons">
                <a href="#about" class="btn">Know More</a>
                <a href="https://rahulshaik22.github.io/imperial-cars.html" class="btn">My Work 🚗</a>
            </div>
        </div>
    </section>

</body>
</html>
