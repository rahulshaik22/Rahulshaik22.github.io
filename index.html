<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Portfolio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding-left:80px;
  position:relative;

  background:
    linear-gradient(to right, #000 45%, rgba(0,0,0,0.7) 60%, transparent 80%),
    url("rahul.png");

  background-size: cover;
  background-repeat: no-repeat;
  background-position: right center;
}

/* BLEND FIX */
.hero::after{
  content:"";
  position:absolute;
  right:0;
  top:0;
  width:40%;
  height:100%;
  background:linear-gradient(to left, rgba(0,0,0,0.9), transparent);
}

/* TEXT */
.text{
  max-width:500px;
  z-index:2;
}

.text h1{
  font-size:3.5rem;
}

.text p{
  color:#aaa;
  margin:20px 0;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  background:#4CAF50;
  color:white;
  text-decoration:none;
  margin-right:10px;
  border-radius:5px;
}

/* SERVICES */
.services{
  padding:80px 20px;
  text-align:center;
  background:#111;
}

.cards{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:#1a1a1a;
  padding:20px;
  width:250px;
}

/* PROJECT */
.project{
  text-align:center;
  padding:60px;
}
</style>
</head>

<body>

<section class="hero">
  <div class="text">
    <h1>Hi, I am Rahul</h1>
    <p>I create modern websites and cinematic digital experiences.</p>

    <a href="#" class="btn">Know More</a>
    <a href="#" class="btn">My Work</a>
  </div>
</section>

<section class="services">
  <h2>Our Services</h2>

  <div class="cards">
    <div class="card">Development</div>
    <div class="card">Design</div>
    <div class="card">SEO</div>
  </div>
</section>

<section class="project">
  <h2>My Project</h2>
  <a href="imperial-cars.html" class="btn">Open Imperial Cars 🚗</a>
</section>

</body>
</html>
