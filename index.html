<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Macondo&display=swap" rel="stylesheet">
    
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Macondo', cursive;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Hero Section Container */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: #000; /* Fallback if image fails */
            overflow: hidden;
        }

      /* THE FIX: Changed position to 'top right' so your face is visible */
.hero::before {
    content: "";
    position: absolute;
    inset: 0; 
    background-image: url('rahul.png'); 
    background-repeat: no-repeat;
    background-size: cover;
    /* 'top right' or '20% right' usually centers the face in the frame */
    background-position: top right; 
    z-index: 1; 
    display: block;
}

/* THE FIX: Lightened the gradient so it doesn't "black out" your face */
.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to right,
        rgba(0,0,0,0.8) 0%,   /* Dark behind the text */
        rgba(0,0,0,0.2) 50%,  /* Much lighter in the middle */
        transparent 100%      /* Clear over your face */
    );
    z-index: 2;
}
        /* The Text Content Layer */
        .content {
            position: relative;
            z-index: 10; /* Sits on top of everything */
            max-width: 900px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 400;
        }

        /* Lavish Font for Name */
        .lavish-name {
            font-family: 'Lavishly Yours', cursive;
            color: #22c55e;
            font-size: 120px; 
            display: block;
            margin: -5px 0; 
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
            line-height: 1;
        }

        .content p {
            font-size: 20px;
            color: #ccc;
            margin: 20px 0 35px 0;
            max-width: 500px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 12px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            text-align: center;
            transition: 0.3s;
            width: 200px;
            color: #fff;
            background: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            display: block;
        }

        .btn:hover {
            background: #16a34a;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.5);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInImg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .hero { padding: 0 5%; text-align: center; justify-content: center; }
            .lavish-name { font-size: 80px; }
            .hero-title { font-size: 32px; }
            .hero::before { background-position: center; opacity: 0.6; }
            .overlay { background: rgba(0,0,0,0.6); }
            .buttons { align-items: center; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>
        
        <div class="content">
            <h1 class="hero-title">
                Hi, I am <br>
                <span class="lavish-name">Rahul Shaik</span>
            </h1>
            
            <p>I create modern websites and cinematic digital experiences.</p>
            
            <div class="buttons">
                <a href="#about" class="btn">Know More</a>
                <a href="https://rahulshaik22.github.io/imperial-cars.html" class="btn">My Work 🚗</a>
            </div>
        </div>
    </section>

</body>
</html>
