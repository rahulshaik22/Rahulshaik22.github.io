<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Eagle';
            src: url('EagleHorizonP.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            overflow: hidden;
        }

        /* Background Image */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('rahul.png') no-repeat 80% center; 
            background-size: cover;
            z-index: 0;
        }

        /* Dark Fade Overlay for Readability */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(0,0,0,1) 30%, 
                rgba(0,0,0,0.7) 60%,
                transparent 100%
            );
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .hero-title {
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        /* The Eagle Font Style */
        .eagle-font {
            font-family: 'Eagle', cursive;
            color: #22c55e;
            font-size: 90px;
            letter-spacing: 2px;
            text-shadow: 
                0 0 10px rgba(34, 197, 94, 0.8),
                0 0 30px rgba(34, 197, 94, 0.4);
        }

        .content p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.4;
        }

        /* BUTTONS STACKED AS PER IMAGE */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: fit-content;
        }

        .btn {
            padding: 14px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            transition: 0.3s ease;
            width: 180px;
            display: block;
        }

        .primary {
            background: #22c55e;
            color: #fff;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .primary:hover {
            background: #16a34a;
            transform: scale(1.05);
        }

        /* About Section */
        section#about {
            padding: 100px 8%;
            background: #000;
        }

        h2 { color: #22c55e; margin-bottom: 20px; }

        footer {
            text-align: center;
            padding: 30px;
            color: #444;
            font-size: 14px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero-title { font-size: 45px; }
            .eagle-font { font-size: 50px; }
            .hero::before { background-position: center; opacity: 0.6; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>
        
        <div class="content">
            <h1 class="hero-title">
                Hi, I am <span class="eagle-font">Rahul Shaik</span>
            </h1>
            
            <p>I create modern websites and cinematic digital experiences.</p>
            
            <div class="buttons">
                <a href="#about" class="btn primary">Know More</a>
                <a href="https://rahulshaik22.github.io/imperial-cars.html" class="btn primary">My Work 🚗</a>
            </div>
        </div>
    </section>

    <section id="about">
        <h2>About Me</h2>
        <p>I am a creative developer focused on building modern, cinematic, and high-performance websites.</p>
    </section>

    <footer>
        © 2026 Rahul | All Rights Reserved
    </footer>

</body>
</html>
