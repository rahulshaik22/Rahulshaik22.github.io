<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Shaik | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Macondo&display=swap" rel="stylesheet">
    
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Macondo', cursive;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: #000;
            overflow: hidden;
        }

        /* The Background Image Layer */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            /* Matches your uploaded filename */
            background-image: url('rahul.jpg'); 
            background-repeat: no-repeat;
            background-size: cover;
            
            /* 85% = Pushes you to the right side of the screen.
               0% = Locks the top of the photo so your face is always visible.
            */
            background-position: 85% 0%; 
            
            z-index: 1;
            display: block;
            animation: fadeInImg 1.5s ease-in-out;
        }

        /* Cinematic Gradient Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(0,0,0,0.95) 15%, 
                rgba(0,0,0,0.2) 55%, 
                transparent 100%
            );
            z-index: 2;
        }

        /* Text Content */
        .content {
            position: relative;
            z-index: 10;
            max-width: 900px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Lavish Name Styling */
        .lavish-name {
            font-family: 'Lavishly Yours', cursive;
            color: #22c55e;
            font-size: 130px; 
            display: block;
            margin: -10px 0; 
            text-shadow: 0 0 25px rgba(34, 197, 94, 0.7);
            line-height: 1;
        }

        .content p {
            font-size: 22px;
            color: #ddd;
            margin: 25px 0 40px 0;
            max-width: 550px;
            letter-spacing: 0.5px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            padding: 14px 45px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 19px;
            text-align: center;
            transition: all 0.3s ease;
            width: 230px;
            color: #fff;
            background: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            display: block;
            border: 1px solid transparent;
        }

        .btn:hover {
            background: transparent;
            border-color: #22c55e;
            color: #22c55e;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
        }
