<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Shaik | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Macondo&display=swap" rel="stylesheet">
    
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Macondo', cursive;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: #000;
            overflow: hidden;
        }

        /* The Background Image */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            /* Updated to .jpg to match your latest upload */
            background-image: url('rahul.jpg'); 
            background-repeat: no-repeat;
            background-size: cover;
            
            /* 80% shifts the image so you are on the right.
               0% ensures the crop starts at the top of the photo (your face).
            */
            background-position: 80% 0%; 
            
            z-index: 1;
            display: block;
            animation: fadeInImg 1.5s ease-in-out;
        }

        /* Cinematic Gradient Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(0,0,0,0.9) 10%, 
                rgba(0,0,0,0.2) 50%, 
                transparent 100%
            );
            z-index: 2;
        }

        /* Text Content */
        .content {
            position: relative;
            z-index: 10;
            max-width: 900px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 400;
            color: #fff;
        }

        /* Lavish Name Styling */
        .lavish-name {
            font-family: 'Lavishly Yours', cursive;
            color: #22c55e;
            font-size: 120px; 
            display: block;
            margin: -5px 0; 
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
            line-height: 1;
        }

        .content p {
            font-size: 20px;
            color: #ccc;
            margin: 20px 0 35px 0;
            max-width: 500px;
        }

        /* Buttons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
