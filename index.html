<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Macondo&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Set Macondo as the default font for the entire site */
            font-family: 'Macondo', cursive;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            overflow: hidden;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('rahul.png') no-repeat;
            background-size: cover; 
            background-position: 85% center; 
            z-index: 0;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(0,0,0,1) 30%, 
                rgba(0,0,0,0.7) 60%,
                transparent 100%
            );
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        /* Macondo Header Part */
        .hero-title {
            font-size: 45px;
            font-weight: 400;
            color: #fff;
            letter-spacing: 1px;
        }

        /* Lavishly Yours - Only for Rahul Shaik */
        .lavish-name {
            font-family: 'Lavishly Yours', cursive;
            color: #22c55e;
            font-size: 115px; 
            display: block;
            margin: 5px 0;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
            line-height: 0.9;
        }

        .content p {
            font-size: 20px;
            color: #ccc;
            margin-bottom: 35px;
            max-width: 550px;
        }

        /* BUTTONS (Macondo Font) */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: fit-content;
        }

        .btn {
            padding: 12px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 400;
            font-size: 18px;
            text-align: center;
            transition: 0.3s ease;
            width: 200px;
            border: 1px solid transparent;
        }

        .primary {
            background: #22c55e;
            color: #fff;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
        }

        .primary:hover {
            background: transparent;
            border-color: #22c55e;
            color: #22c55e;
            transform: scale(1.02);
        }

        /* About Section */
        section#about {
            padding: 100px 8%;
            background: #000;
        }

        h2 { 
            color: #22c55e; 
            margin-bottom: 20px; 
            font-size: 40px;
            font-weight: 400;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #555;
            font-size: 16px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero-title { font-size: 28px; }
            .lavish-name { font-size: 75px; }
            .hero::before { background-position: center; opacity: 0.5; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>
        
        <div class="content">
            <h1 class="hero-title">
                Hi, I am <br>
                <span class="lavish-name">Rahul Shaik</span>
            </h1>
            
            <p>I create modern websites and cinematic digital experiences.</p>
            
            <div class="buttons">
                <a href="#about" class="btn primary">Know More</a>
                <a href="https://rahulshaik22.github.io/imperial-cars.html" class="btn primary">My Work 🚗</a>
            </div>
        </div>
    </section>

    <section id="about">
        <h2>About Me</h2>
        <p>I am a creative developer focused on building modern, cinematic, and high-performance websites.</p>
    </section>

    <footer>
        © 2026 Rahul | All Rights Reserved
    </footer>

</body>
</html>
