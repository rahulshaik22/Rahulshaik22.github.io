<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Shaik | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Macondo&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Macondo', cursive;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 10%;
            overflow: hidden;
            background: #000;
        }

        /* The Background Image Layer */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            /* CHANGED TO .png TO MATCH YOUR GITHUB REPO */
            background-image: url('rahul.png'); 
            background-repeat: no-repeat;
            background-size: cover;
            /* Focuses on you on the right side */
            background-position: center right; 
            z-index: 1;
            opacity: 0.9;
            animation: cinematicZoom 12s infinite alternate ease-in-out;
        }

        /* Cinematic Gradient Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                rgba(0,0,0,1) 0%, 
                rgba(0,0,0,0.8) 40%, 
                rgba(0,0,0,0.1) 70%, 
                transparent 100%
            );
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .hero-title {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 2px;
        }

        .lavish-name {
            font-family: 'Lavishly Yours', cursive;
            color: #22c55e;
            font-size: clamp(80px, 12vw, 150px); 
            display: block;
            margin: -15px 0; 
            text-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
            line-height: 0.9;
        }

        .content p {
            font-size: clamp(18px, 2vw, 22px);
            color: #bbb;
            margin: 30px 0 45px 0;
            max-width: 500px;
            letter-spacing: 0.5px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .btn {
            padding: 16px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 200px;
            border: 2px solid transparent;
        }

        .btn-primary {
            background: #22c55e;
            color: #000;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }

        .btn-outline {
            background: transparent;
            color: #22c55e;
            border-color: #22c55e;
        }

        .btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 30px rgba(34, 197, 94, 0.4);
            background: #16a34a;
            color: #fff;
            border-color: transparent;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(60px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes cinematicZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* Responsive Fixes for Mobile */
        @media (max-width: 992px) {
            .hero { padding: 0 5%; justify-content: center; text-align: center; }
            .content p { margin-inline: auto; }
            .buttons { justify-content: center; }
            .hero::before { background-position: center top; opacity: 0.5; }
            .overlay { background: rgba(0,0,0,0.8); }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>
        
        <div class="content">
            <h1 class="hero-title">
                Hi, I am <br>
                <span class="lavish-name">Rahul Shaik</span>
            </h1>
            
            <p>Crafting modern web architectures and high-fidelity digital experiences.</p>
            
            <div class="buttons">
                <a href="#about" class="btn btn-primary">Know More</a>
                <a href="https://rahulshaik22.github.io/imperial-cars.html" class="btn btn-outline">My Work 🚗</a>
            </div>
        </div>
    </section>

</body>
</html>
