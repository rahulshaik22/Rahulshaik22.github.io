<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Portfolio</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0c0c0c;
  color:white;
}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:80px;
  min-height:100vh;
}

.text{
  max-width:500px;
}

.text h1{
  font-size:3rem;
}

.text p{
  color:#aaa;
  margin:20px 0;
  line-height:1.5;
}

/* BUTTON */
.btn{
  padding:12px 20px;
  background:#4CAF50;
  color:white;
  text-decoration:none;
  margin-right:10px;
  border-radius:5px;
}

/* IMAGE */
.hero img{
  width:380px;
  border-radius:10px;
}

/* SERVICES */
.services{
  padding:80px 20px;
  text-align:center;
  background:#111;
}

.cards{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:#1a1a1a;
  padding:25px;
  width:250px;
  border-radius:8px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

/* PROJECT */
.project{
  text-align:center;
  padding:60px;
}

.project a{
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  background:#4CAF50;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

/* MOBILE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero img{
    width:250px;
    margin-top:30px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <div class="text">
    <h1>Hi, I am Rahul</h1>
    <p>I create modern websites and clean digital experiences.</p>

    <a href="#services" class="btn">Know More</a>
    <a href="#projects" class="btn">My Work</a>
  </div>

  <!-- YOUR IMAGE -->
  <img src="rahul.png" alt="Rahul">

</section>

<!-- SERVICES -->
<section class="services" id="services">
  <h2>Our Services</h2>

  <div class="cards">
    <div class="card">
      <h3>Development</h3>
      <p>Modern responsive websites</p>
    </div>

    <div class="card">
      <h3>Design</h3>
      <p>Clean UI/UX design</p>
    </div>

    <div class="card">
      <h3>SEO</h3>
      <p>Fast and optimized websites</p>
    </div>
  </div>
</section>

<!-- PROJECT -->
<section class="project" id="projects">
  <h2>My Project</h2>

  <h3>Imperial Cars 🚗</h3>
  <p>Luxury car showcase website</p>

  <a href="imperial-cars.html">Open</a>
</section>

</body>
</html>
