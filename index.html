<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul Shaik | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lavishly+Yours&family=Macondo&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Macondo', cursive;
        }

        body {
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background: #000;
            overflow: hidden;
        }

        /* The Background Image Layer */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            /* Using the confirmed .jpg extension */
            background-image: url('rahul.jpg'); 
            background-repeat: no-repeat;
            background-size: cover;
            
            /* 90% pushes the image to the right side of the screen.
               5% ensures the crop starts near the top of the photo to keep your face in frame.
            */
            background-position: 90% 5%; 
            
            z-index: 1;
            display: block;
            animation: fadeInImg 1.5s ease-in-out;
        }

        /* Cinematic Gradient Overlay */
        .overlay {
            position: absolute;
            inset: 0;
            /* Darker on the left for text readability, clear on the right for the face */
            background: linear-gradient(
                to right,
                rgba(0,0,0,0.95) 15%, 
                rgba(0,0,0,0.2) 60%, 
                transparent 100%
            );
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 900px;
            animation: fadeInUp 1s ease-out;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .lavish-name {
            font-family: 'Lavishly Yours', cursive;
            color: #22c55e;
            font-size: 130px; 
            display: block;
            margin: -10px 0; 
            text-shadow: 0 0 25px rgba(34, 197, 94, 0.7);
            line-height: 1;
        }

        .content p {
            font-size: 22px;
            color: #ddd;
            margin: 25px 0 40px 0;
            max-width: 550px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            padding: 14px 45px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 19px;
            text-align: center;
            transition: all 0.3s ease;
            width: 230px;
            color: #fff;
            background: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            display: block;
        }

        .btn:hover {
            background: #16a34a;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInImg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .hero { padding: 0 5%; text-align: center; justify-content: center; }
            .lavish-name { font-size: 85px; }
            .hero::before { 
                background-position: center 5%; 
                opacity: 0.6; 
            }
            .overlay { background: rgba(0,0,0,0.8); }
            .buttons { align-items: center; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="overlay"></div>
        
        <div class="content">
            <h1 class="hero-title">
                Hi, I am <br>
                <span class="lavish-name">Rahul Shaik</span>
            </h1>
            
            <p>I create modern websites and cinematic digital experiences.</p>
            
            <div class="buttons">
                <a href="#about" class="btn">Know More</a>
                <a href="https://rahulshaik22.github.io/imperial-cars.html" class="btn">My Work 🚗</a>
            </div>
        </div>
    </section>

</body>
</html>
